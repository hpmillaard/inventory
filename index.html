<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inventory</title>
    <style>
        body {
            font-family: Segoe UI, Arial;
            margin: 8px
        }

        table {
            border-collapse: collapse;
            width: 100%
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 6px
        }

        th {
            cursor: pointer;
            background: #f4f4f4
        }

        tr:nth-child(even) {
            background: #fafafa
        }

        input.search {
            margin-bottom: 6px;
            padding: 6px;
            width: 99%
        }

        details {
            white-space: pre-wrap
        }

        .subtable {
            width: auto;
            border-collapse: collapse;
            font-size: smaller;
            color: #333;
            display: inline-table;
            margin-right: 8px;
        }

        .subtable th {
            font-size: inherit;
            padding: 3px 4px;
            text-align: left;
            border: none;
            color: #333;
        }

        .software .subtable,
        .software .subtable td {
            font-size: smaller;
            color: #333;
            padding: 2px 4px;
        }

        .subtable td {
            border: none;
            padding: 2px 6px;
            vertical-align: top;
        }
    </style>
</head>

<body>
    <h2>Software Inventory</h2>
    <div id="status" style="margin-bottom:8px;color:#333;display:inline-block"></div>
    <div id="notice" style="margin-top:8px;color:crimson"></div>
    <script>
        function loadInventoryScript(cb) {
            // remove any previously injected inventory script
            document.querySelectorAll('script').forEach(s => { try { if (s.src && s.src.indexOf('inventory_merged.js') !== -1) s.remove(); } catch (e) { } });
            const s = document.createElement('script');
            s.src = 'inventory_merged.js?t=' + Date.now();
            s.onload = cb;
            s.onerror = function () { const st = document.getElementById('status'); if (st) st.textContent = 'Kon inventory_merged.js niet laden.'; const n = document.getElementById('notice'); if (n) n.textContent = 'Kon inventory_merged.js niet laden.' };
            document.head.appendChild(s);
        }

        async function runInventory() {
            async function loadData() {
                if (window.INVENTORY_MERGED) {
                    let d = window.INVENTORY_MERGED;
                    if (typeof d === 'string') {
                        try { d = JSON.parse(d) } catch (e) { console.warn('Kon merged JSON niet parsen', e) }
                    }
                    if (Array.isArray(d)) {
                        return d.map(it => {
                            if (it) {
                                if (it.Disks && !Array.isArray(it.Disks)) {
                                    if (it.Disks.Device || it.Disks.FreeGB || it.Disks.SizeGB) { it.Disks = [it.Disks] }
                                    else {
                                        try { it.Disks = Object.values(it.Disks).filter(x => x && typeof x === 'object') } catch (e) { it.Disks = [] }
                                    }
                                } else if (!it.Disks) { it.Disks = [] }
                                if (it.InstalledSoftware && !Array.isArray(it.InstalledSoftware)) {
                                    try { it.InstalledSoftware = Object.values(it.InstalledSoftware).filter(x => x && typeof x === 'object') } catch (e) { it.InstalledSoftware = [] }
                                } else if (!it.InstalledSoftware) { it.InstalledSoftware = [] }
                            }
                            if (it.IPAddresses && !Array.isArray(it.IPAddresses)) {
                                if (typeof it.IPAddresses === 'string') { it.IPAddresses = [it.IPAddresses] }
                                else {
                                    try { it.IPAddresses = Object.values(it.IPAddresses).filter(x => x) } catch { it.IPAddresses = [] }
                                }
                            } else if (!it.IPAddresses) { it.IPAddresses = [] }
                            return it
                        })
                    }
                    if (d && typeof d === 'object') {
                        if (d.Disks && !Array.isArray(d.Disks)) {
                            if (d.Disks.Device || d.Disks.FreeGB || d.Disks.SizeGB) { d.Disks = [d.Disks] }
                            else { try { d.Disks = Object.values(d.Disks).filter(x => x && typeof x === 'object') } catch { d.Disks = [] } }
                        }
                        if (d.InstalledSoftware && !Array.isArray(d.InstalledSoftware)) { try { d.InstalledSoftware = Object.values(d.InstalledSoftware).filter(x => x && typeof x === 'object') } catch { d.InstalledSoftware = [] } }
                        if (d.IPAddresses && !Array.isArray(d.IPAddresses)) {
                            if (typeof d.IPAddresses === 'string') { d.IPAddresses = [d.IPAddresses] } else { try { d.IPAddresses = Object.values(d.IPAddresses).filter(x => x) } catch { d.IPAddresses = [] } }
                        } else if (!d.IPAddresses) { d.IPAddresses = [] }
                        return [d]
                    }
                    return []
                }
                const n = document.getElementById('notice'); if (n) n.innerHTML = 'Geen samengevoegde data gevonden. Draai <code>view-Inventory.ps1</code> op de fileserver om <code>inventory_merged.js</code> te maken, vernieuw de pagina daarna.';
                return [];
            }

            function getTotalFree(disks) {
                if (!disks) return '';
                let list = Array.isArray(disks) ? disks : (typeof disks === 'object' ? Object.values(disks) : []);
                let sum = 0; for (const d of list) { if (d && d.FreeGB) sum += Number(d.FreeGB); }
                return Math.round(sum * 100) / 100;
            }

            function pad(n) { return (n === undefined || n === null) ? '' : String(n).padStart(2, '0'); }

            function formatDate(iso) {
                if (!iso) return '';
                try {
                    const d = new Date(iso);
                    if (isNaN(d)) return iso;
                    const day = pad(d.getDate());
                    const month = pad(d.getMonth() + 1);
                    const year = d.getFullYear();
                    const hour = pad(d.getHours());
                    const minute = pad(d.getMinutes());
                    return `${day}-${month}-${year}, ${hour}:${minute}`;
                } catch (e) { return iso }
            }

            function formatDateMinute(iso) {
                return formatDate(iso);
            }

            function renderTable(data) {
                const tbody = document.querySelector('#tbl tbody');
                tbody.innerHTML = '';
                let appended = 0;
                for (const item of data) {
                    try {
                        const tr = document.createElement('tr');
                        const diskLines = (item.Disks || []).map(d => {
                            const size = Number(d.SizeGB) || 0;
                            const free = Number(d.FreeGB) || 0;
                            const sizeTxt = size ? (Math.round(size * 100) / 100) : '';
                            const freeTxt = Math.round(free * 100) / 100;
                            let pctVal = null;
                            if (d.FreePercent !== undefined && d.FreePercent !== null) { pctVal = Number(d.FreePercent) }
                            else if (size > 0) { pctVal = Math.round((free / size) * 1000) / 10 }
                            let spanStyle = '';
                            if (pctVal !== null) {
                                if (pctVal < 5) spanStyle = 'color:#c00;font-weight:600';
                                else if (pctVal < 10) spanStyle = 'color:orange;font-weight:600';
                            }
                            return `<tr><td>${d.Device || ''}</td><td>${sizeTxt}</td><td>${freeTxt}</td><td><span style="${spanStyle}">${pctVal !== null ? pctVal : ''}</span></td></tr>`;
                        }).join('');
                        const diskTable = `<table class="subtable"><tr><th style="font-weight:600;border-bottom:1px solid #ddd;padding-bottom:4px;text-align:left">Schijf</th><th style="font-weight:600;border-bottom:1px solid #ddd;padding-bottom:4px">Grootte</th><th style="font-weight:600;border-bottom:1px solid #ddd;padding-bottom:4px">Vrij</th><th style="font-weight:600;border-bottom:1px solid #ddd;padding-bottom:4px">%</th></tr>${diskLines}</table>`;
                        const softwareRows = (item.InstalledSoftware || []).map(s => `<tr><td>${s.Name || ''}</td><td style="width:1%">${s.Version || ''}</td></tr>`).join('');
                        const softwareTable = `<table class="subtable">${softwareRows}</table>`;
                        const av = item.AV || {};
                        const avDef = av.DefinitionVersion || av.Definition || av.Definitions || '';
                        const avLastScan = av.LastScanTime || item.LastScanTime || av.LastFullScanTime || '';
                        tr.innerHTML = `<td style="vertical-align:top"><div style="font-weight:600">${item.ComputerName || ''}</div><div style="font-size:smaller;color:#666;margin-top:4px">Last inventory: ${item.Timestamp ? formatDateMinute(item.Timestamp) : ''}</div></td><td style="vertical-align:top"><div style="font-weight:600">${item.HWModel ? (item.HWModel) : ''}</div><div style="font-size:smaller;color:#333;margin-top:4px">SN: ${item.SerialNumber || ''}</div><div style="font-size:smaller;color:#333;margin-top:4px">${item.CPU ? (`cores: ${item.CPU.TotalCores || item.CPU.PhysicalCount || ''} / logical: ${item.CPU.TotalLogicalProcessors || ''}`) : ''}</div><div style="font-size:smaller;color:#333;margin-top:3px">${item.CPU && item.CPU.Model ? item.CPU.Model : ''}</div><div style="font-size:smaller;color:#333;margin-top:4px">Memory: ${item.MemoryGB !== undefined && item.MemoryGB !== null ? (item.MemoryGB + ' GB') : ''}</div>${diskTable}</td><td style="vertical-align:top"><div style="font-weight:600">${item.OSCaption ? item.OSCaption : ''}${item.BuildNumber ? (' (Build ' + item.BuildNumber + (item.UBR ? ('.' + item.UBR) : '') + ')') : ''}</div><div style="font-size:smaller;color:#333;margin-top:4px">Last boot: ${formatDate(item.LastBootUpTime)}</div><div style="margin-top:4px">${item.PendingReboot ? '<span style="color:#c00;font-weight:600">Pending reboot</span>' : ''}</div><div style="font-size:smaller;color:#333;margin-top:6px">${item.LastLoggedOnUser || ''}</div><div style="font-size:smaller;color:#333;margin-top:3px">${av.Product ? ('<div style="font-weight:600">' + av.Product + '</div>') : ''}${avDef ? ('<div>Definitions: ' + avDef + '</div>') : ''}${av.LastDefinitionUpdate ? ('<div>Defs updated: ' + formatDate(av.LastDefinitionUpdate) + '</div>') : ''}${avLastScan ? ('<div>Last scan: ' + formatDate(avLastScan) + '</div>') : ''}${av.UpToDate === true ? '<div style="color:green;font-weight:600">Up-to-date</div>' : av.UpToDate === false ? '<div style="color:#c00;font-weight:600">Outdated</div>' : ''}</div></td><td style="vertical-align:top">${(item.IPAddresses || []).join('<br>')}</td><td style="vertical-align:top">${softwareTable}</td>`;
                        tbody.appendChild(tr);
                        appended++;
                    } catch (e) {
                        console.error('Fout bij renderen rij:', e, item);
                    }
                }
                const st = document.getElementById('status');
                const n = document.getElementById('notice'); if (n) n.innerHTML = '';
                if (st) st.textContent = `Aantal computers: ${data.length}`;
                if (appended === 0) {
                    if (st) st.textContent = `Aantal computers: ${data.length} — geen rijen gerenderd (zie console)`;
                }
            }

            function makeSortable(data) {
                // Only headers with a data-key attribute are sortable.
                const ths = Array.from(document.querySelectorAll('#tbl thead th')).filter(t => t.dataset.key);

                function ipToNumber(ipStr) {
                    if (!ipStr) return NaN;
                    const s = String(ipStr).split(/[\s,]+/)[0];
                    const parts = s.split('.').map(p => parseInt(p, 10));
                    if (parts.length !== 4 || parts.some(p => isNaN(p))) return NaN;
                    return parts[0] * 16777216 + parts[1] * 65536 + parts[2] * 256 + parts[3];
                }

                function getSortableValue(item, key) {
                    if (!item) return '';
                    switch (key) {
                        case 'ComputerName': return (item.ComputerName || '').toString();
                        case 'HWModel': return (((item.HWModel || '') + ' ' + (item.SerialNumber || ''))).toString();
                        case 'Build': return (((item.OSCaption || '') + ' ' + (item.BuildNumber || '') + (item.UBR ? ('.' + item.UBR) : ''))).toString();
                        case 'IPAddresses': return ((item.IPAddresses && (Array.isArray(item.IPAddresses) ? item.IPAddresses.join(',') : item.IPAddresses)) || '').toString();
                        default: return '';
                    }
                }

                ths.forEach((th) => {
                    const key = th.dataset.key;
                    th.style.userSelect = 'none';
                    let ind = th.querySelector('.sort-indicator');
                    if (!ind) { ind = document.createElement('span'); ind.className = 'sort-indicator'; ind.style.marginLeft = '8px'; th.appendChild(ind); }
                    th.addEventListener('click', () => {
                        const dir = th.dataset.dir === 'asc' ? 'desc' : 'asc';
                        // clear indicators
                        Array.from(document.querySelectorAll('#tbl thead th')).forEach(t => { t.dataset.dir = ''; const si = t.querySelector('.sort-indicator'); if (si) si.textContent = '' });
                        th.dataset.dir = dir;
                        ind.textContent = dir === 'asc' ? '▲' : '▼';
                        data.sort((a, b) => {
                            const va = getSortableValue(a, key) || '';
                            const vb = getSortableValue(b, key) || '';
                            // IP numeric compare
                            if (key === 'IPAddresses') {
                                const na = ipToNumber(va);
                                const nb = ipToNumber(vb);
                                if (!isNaN(na) && !isNaN(nb)) { return dir === 'asc' ? na - nb : nb - na }
                            }
                            // try numeric compare
                            const na = parseFloat(va.replace(/[^0-9eE+.-]/g, ''));
                            const nb = parseFloat(vb.replace(/[^0-9eE+.-]/g, ''));
                            if (!isNaN(na) && !isNaN(nb)) { return dir === 'asc' ? na - nb : nb - na }
                            // date compare
                            const da = Date.parse(va); const db = Date.parse(vb);
                            if (!isNaN(da) && !isNaN(db)) { return dir === 'asc' ? da - db : db - da }
                            return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                        });
                        renderTable(data);
                    });
                });
            }

            const data = await loadData();
            console.log('Inventory loaded, type:', typeof window.INVENTORY_MERGED, 'isArray:', Array.isArray(window.INVENTORY_MERGED), 'count:', data.length);
            let viewData = Array.isArray(data) ? data.slice() : [];
            makeSortable(viewData);
            renderTable(viewData);
        }

        const stInit = document.getElementById('status'); if (stInit) stInit.textContent = 'Laden...';
        loadInventoryScript(runInventory);
    </script>
    <table id="tbl">
        <thead>
            <tr>
                <th data-key="ComputerName">Computer</th>
                <th data-key="HWModel">Hardware</th>
                <th data-key="Build">Operating System</th>
                <th data-key="IPAddresses">IP(s)</th>
                <th>Software</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</body>

</html>
